audio:
  ros__parameters:
    # ALSA device naming: `plughw:CARD=<card_name>,DEV=0`
    #   <card_name> comes from `arecord -l` / `aplay -l` output:
    #     card 2: Device [USB PnP Sound Device]  →  CARD=Device
    #   Use `plughw` (not `hw`) for automatic sample-rate conversion (16kHz).
    mic_device: "plughw:CARD=Device,DEV=0"
    speaker_device: "plughw:CARD=Device,DEV=0"
    sample_rate: 16000
    kws:
      enable: false
      model:
        encoder: "src/buddy_audio/models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile/encoder-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
        decoder: "src/buddy_audio/models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile/decoder-epoch-12-avg-2-chunk-16-left-64.onnx"
        joiner: "src/buddy_audio/models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile/joiner-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
        tokens: "src/buddy_audio/models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile/tokens.txt"
      keywords_file: "src/buddy_audio/models/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile/test_wavs/test_keywords.txt"
      threshold: 0.1
      score: 3.0
    asr:
      model:
        encoder: "src/buddy_audio/models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/encoder-epoch-99-avg-1.int8.onnx"
        decoder: "src/buddy_audio/models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/decoder-epoch-99-avg-1.onnx"
        joiner: "src/buddy_audio/models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/joiner-epoch-99-avg-1.int8.onnx"
        tokens: "src/buddy_audio/models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/tokens.txt"
      decoding_method: "greedy_search"
    # TTS — sherpa-onnx offline TTS (leave model empty to disable)
    tts:
      model: "src/buddy_audio/models/vits-icefall-zh-aishell3/model.onnx"
      tokens: "src/buddy_audio/models/vits-icefall-zh-aishell3/tokens.txt"
      lexicon: "src/buddy_audio/models/vits-icefall-zh-aishell3/lexicon.txt"
      data_dir: ""
      rule_fsts: "src/buddy_audio/models/vits-icefall-zh-aishell3/number.fst,src/buddy_audio/models/vits-icefall-zh-aishell3/phone.fst,src/buddy_audio/models/vits-icefall-zh-aishell3/date.fst"
      sid: 0
      speed: 1.0
