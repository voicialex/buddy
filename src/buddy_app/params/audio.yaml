audio:
  ros__parameters:
    models_dir: "models"
    # List devices:  arecord -l (mic) / aplay -l (speaker)
    # ALSA device naming: `plughw:CARD=<card_name>,DEV=0`
    #   <card_name> comes from `arecord -l` / `aplay -l` output:
    #     card 2: Device [USB PnP Sound Device]  →  CARD=Device
    #   Use `plughw` (not `hw`) for automatic sample-rate conversion (16kHz).
    mic_device: "plughw:CARD=Headset,DEV=0"      # desktop headset
    speaker_device: "plughw:CARD=Headset,DEV=0"  # desktop headset
    #mic_device: "plughw:CARD=Device,DEV=0"         # rk3588 USB PnP Sound Device
    #speaker_device: "plughw:CARD=Device,DEV=0"     # rk3588 USB PnP Sound Device
    sample_rate: 16000
    asr_cooldown_ms: 300
    kws:
      enable: false
      model_dir: "sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01-mobile"
      model:
        encoder: "encoder-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
        decoder: "decoder-epoch-12-avg-2-chunk-16-left-64.onnx"
        joiner: "joiner-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
        tokens: "tokens.txt"
      keywords_file: "keywords.txt"
      threshold: 0.08
      score: 2.2

    # ASR: mode = "local" | "server"
    #      engine = "auto" | "sherpa-onnx" | "native"
    #      runtime = "auto" | "onnxruntime" | "rknnruntime"
    asr:
      mode: "local"
      engine: "auto"
      runtime: "auto"
      server:
        funasr:
          url: "ws://127.0.0.1:10095"
          mode: "online"
      local:
        sherpa:
          model_dir: "sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20"
          model:
            encoder: "encoder-epoch-99-avg-1.int8.onnx"
            decoder: "decoder-epoch-99-avg-1.onnx"
            joiner: "joiner-epoch-99-avg-1.int8.onnx"
            tokens: "tokens.txt"
          decoding_method: "greedy_search"
        native:
          model_dir: "zipformer-rknn"
          model:
            encoder: "encoder.rknn"
            decoder: "decoder.rknn"
            joiner: "joiner.rknn"
            tokens: "tokens.txt"

    # TTS: mode = "local" | "server"
    #      engine = "auto" | "sherpa-onnx" | "native"
    #      runtime = "auto" | "onnxruntime" | "rknnruntime"
    tts:
      mode: "local"
      engine: "auto"
      runtime: "auto"
      server:
        chattts:
          url: "http://127.0.0.1:9880/tts"
      local:
        sherpa:
          model_type: "melo"  # kokoro | vits | melo
          # # Kokoro (default) — multi-voice, expressive, zh+en
          # model_dir: "kokoro-int8-multi-lang-v1_1"
          # model: "model.int8.onnx"
          # tokens: "tokens.txt"
          # voices: "voices.bin"
          # lexicon: "lexicon-zh.txt"
          # dict_dir: "dict"
          # lang: "zh"
          # data_dir: "espeak-ng-data"
          # rule_fsts: "number-zh.fst,phone-zh.fst,date-zh.fst"
          # # VITS aishell3 (backup) — 174 speakers, zh only
          # model_type: "vits"
          # model_dir: "vits-icefall-zh-aishell3"
          # model: "model.onnx"
          # tokens: "tokens.txt"
          # voices: ""
          # lexicon: "lexicon.txt"
          # data_dir: ""
          # rule_fsts: "number.fst,phone.fst,date.fst"
          # MeloTTS — single female voice, zh+en
          model_dir: "vits-melo-tts-zh_en"
          model: "model.onnx"
          tokens: "tokens.txt"
          voices: ""
          lexicon: "lexicon.txt"
          data_dir: ""
          dict_dir: "dict"
          rule_fsts: "number.fst,phone.fst,date.fst,new_heteronym.fst"
          sid: 0
          speed: 1.0
        moss:
          model_dir: "moss-tts-nano"
          voice: ""
          max_new_frames: 375
          seed: 1234
