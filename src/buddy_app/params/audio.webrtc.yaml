audio:
  ros__parameters:
    preprocess:
      webrtc:
        enable: true
        vad:
          enable: true
          gate:
            enable: false        # brain 端去抖，gate 关避免丢 VAD 信号
            with_kws: false
          # VAD 敏感度：0=极低 1=低 2=中 3=高（kHighLikelihood）。
          # 3 最严格，假阳性最少，适合 barge-in 场景；
          # 环境噪音大或检测不到说话时降到 2。
          likelihood: 3
          frame_ms: 10
          min_voice_frames: 2
          hangover_frames: 18
        ns:
          enable: true
          level: 2
        agc:
          enable: true
          mode: 2
          target_level_dbfs: 6
          compression_gain_db: 6
          limiter_enable: true
          analog_level_min: 0
          analog_level_max: 255
          stream_analog_level: 127
        aec:
          enable: true
          suppression_level: 1
          # near(mic) 与 far(speaker) 信号的时间延迟。
          # ALSA playback buffer + speaker->mic 物理延迟实测 > 80ms，
          # 80ms 时 AEC 找不到回声对应关系，残留 post_rms 0.002-0.01 触发 VAD 误报。
          # 120ms 匹配实际延迟，回声被消除干净，post_rms 降到底噪级别。
          # 若仍误触发，尝试 100/150；若消除过度（用户说话被吞），降回 80。
          stream_delay_ms: 120
